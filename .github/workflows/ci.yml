name: CI

on:
  push:
  pull_request:

jobs:
  go-services:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Test Go services
        run: |
          set -euo pipefail
          for dir in services/*; do
            if [ -f "$dir/go.mod" ]; then
              echo "==> $dir"
              (cd "$dir" && go test ./...)
            fi
          done

  python-services:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax check Python services
        run: |
          set -euo pipefail
          python -m py_compile services/*/*.py
