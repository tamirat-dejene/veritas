<svg id="svg-gateway" class="view-svg" viewBox="0 0 800 500" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <!-- Background Grids -->
                        <defs>
                            <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                                <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.75" />
                            </pattern>
                            <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6"
                                orient="auto-start-reverse">
                                <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
                            </marker>
                            <marker id="arrow-emerald" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6"
                                markerHeight="6" orient="auto-start-reverse">
                                <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669" />
                            </marker>
                        </defs>
                        <rect width="100%" height="100%" fill="url(#grid)" rx="8" />

                        <!-- Group Borders/Context labels -->
                        <rect x="230" y="20" width="160" height="460" rx="12" fill="#ecfdf5" fill-opacity="0.6"
                            stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 4" />
                        <text x="310" y="44" text-anchor="middle" fill="#047857" font-size="11" font-weight="600"
                            letter-spacing="1">GATEWAY LAYER</text>

                        <rect x="420" y="20" width="350" height="460" rx="12" fill="#faf5ff" fill-opacity="0.6"
                            stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4 4" />
                        <text x="595" y="44" text-anchor="middle" fill="#6b21a8" font-size="11" font-weight="600"
                            letter-spacing="1">CORE &amp; AI MICROSERVICES</text>

                        <!-- Actors -->
                        <!-- Enterprise Admin -->
                        <rect x="20" y="100" width="160" height="70" rx="8" fill="#ffffff" stroke="#94a3b8"
                            stroke-width="1.5" />
                        <text x="35" y="125" fill="#0f172a" font-size="12" font-weight="bold">Enterprise Admins</text>
                        <text x="35" y="142" fill="#475569" font-size="10">System Admin &amp; Staff</text>
                        <text x="35" y="155" fill="#64748b" font-size="9" font-family="monospace">REST Clients /
                            Browser</text>

                        <!-- Candidates -->
                        <rect x="20" y="250" width="160" height="70" rx="8" fill="#ffffff" stroke="#94a3b8"
                            stroke-width="1.5" />
                        <text x="35" y="275" fill="#0f172a" font-size="12" font-weight="bold">Candidates</text>
                        <text x="35" y="292" fill="#475569" font-size="10">Web Exam Client</text>
                        <text x="35" y="305" fill="#64748b" font-size="9" font-family="monospace">Browser Session
                            UI</text>

                        <!-- Stripe Webhook -->
                        <rect x="20" y="390" width="160" height="50" rx="8" fill="#f8fafc" stroke="#94a3b8"
                            stroke-width="1" stroke-dasharray="3 3" />
                        <text x="35" y="413" fill="#0f172a" font-size="11" font-weight="bold">Stripe Webhooks</text>
                        <text x="35" y="428" fill="#475569" font-size="9">Payment Callbacks</text>

                        <!-- API Gateway -->
                        <rect x="245" y="80" width="130" height="280" rx="10" fill="#ecfdf5" stroke="#10b981"
                            stroke-width="2" />
                        <text x="310" y="115" text-anchor="middle" fill="#065f46" font-size="13" font-weight="bold">API
                            Gateway</text>
                        <text x="310" y="132" text-anchor="middle" fill="#047857" font-size="10">Gin Reverse
                            Proxy</text>
                        <!-- Details -->
                        <rect x="255" y="160" width="110" height="25" rx="4" fill="#ffffff" stroke="#a7f3d0"
                            stroke-width="1" />
                        <text x="310" y="176" text-anchor="middle" fill="#065f46" font-size="9"
                            font-family="monospace">Auth Verification</text>
                        <rect x="255" y="195" width="110" height="25" rx="4" fill="#ffffff" stroke="#a7f3d0"
                            stroke-width="1" />
                        <text x="310" y="211" text-anchor="middle" fill="#065f46" font-size="9"
                            font-family="monospace">Rate Limiter</text>
                        <rect x="255" y="230" width="110" height="25" rx="4" fill="#ffffff" stroke="#a7f3d0"
                            stroke-width="1" />
                        <text x="310" y="246" text-anchor="middle" fill="#065f46" font-size="9"
                            font-family="monospace">Tenant Headers</text>
                        <rect x="255" y="265" width="110" height="25" rx="4" fill="#ffffff" stroke="#a7f3d0"
                            stroke-width="1" />
                        <text x="310" y="281" text-anchor="middle" fill="#065f46" font-size="9"
                            font-family="monospace">Circuit Breaker</text>

                        <!-- Redis Cache -->
                        <rect x="245" y="390" width="130" height="55" rx="8" fill="#f5f3ff" stroke="#8b5cf6"
                            stroke-width="1.5" />
                        <text x="310" y="413" text-anchor="middle" fill="#5b21b6" font-size="11"
                            font-weight="bold">Redis Cache</text>
                        <text x="310" y="428" text-anchor="middle" fill="#6d28d9" font-size="9">Rate Limits /
                            Sessions</text>

                        <!-- Core Services -->
                        <!-- Auth and Tenant service -->
                        <rect x="440" y="75" width="130" height="55" rx="8" fill="#eff6ff" stroke="#3b82f6"
                            stroke-width="1.5" />
                        <text x="505" y="96" text-anchor="middle" fill="#1e3a8a" font-size="11" font-weight="bold">Auth
                            Service</text>
                        <text x="505" y="112" text-anchor="middle" fill="#2563eb" font-size="9"
                            font-family="monospace">/auth/*</text>

                        <!-- Enterprise (Tenants) -->
                        <rect x="440" y="145" width="130" height="55" rx="8" fill="#eff6ff" stroke="#3b82f6"
                            stroke-width="1.5" />
                        <text x="505" y="166" text-anchor="middle" fill="#1e3a8a" font-size="11"
                            font-weight="bold">Enterprise Service</text>
                        <text x="505" y="182" text-anchor="middle" fill="#2563eb" font-size="9"
                            font-family="monospace">/enterprises/*</text>

                        <!-- Exams (Question bank) -->
                        <rect x="440" y="215" width="130" height="55" rx="8" fill="#eff6ff" stroke="#3b82f6"
                            stroke-width="1.5" />
                        <text x="505" y="236" text-anchor="middle" fill="#1e3a8a" font-size="11" font-weight="bold">Exam
                            Service</text>
                        <text x="505" y="252" text-anchor="middle" fill="#2563eb" font-size="9"
                            font-family="monospace">/exams/* | /questions/*</text>

                        <!-- Candidates (Assessments) -->
                        <rect x="440" y="285" width="130" height="55" rx="8" fill="#eff6ff" stroke="#3b82f6"
                            stroke-width="1.5" />
                        <text x="505" y="306" text-anchor="middle" fill="#1e3a8a" font-size="11"
                            font-weight="bold">Candidate Service</text>
                        <text x="505" y="322" text-anchor="middle" fill="#2563eb" font-size="9"
                            font-family="monospace">/candidates/*</text>

                        <!-- Payments (Stripe billing) -->
                        <rect x="440" y="355" width="130" height="55" rx="8" fill="#eff6ff" stroke="#3b82f6"
                            stroke-width="1.5" />
                        <text x="505" y="376" text-anchor="middle" fill="#1e3a8a" font-size="11"
                            font-weight="bold">Payment Service</text>
                        <text x="505" y="392" text-anchor="middle" fill="#2563eb" font-size="9"
                            font-family="monospace">/subscriptions/*</text>

                        <!-- Proctoring (AI Event Scoring) -->
                        <rect x="615" y="180" width="130" height="55" rx="8" fill="#fff7ed" stroke="#f97316"
                            stroke-width="1.5" />
                        <text x="680" y="201" text-anchor="middle" fill="#7c2d12" font-size="11"
                            font-weight="bold">Proctoring AI</text>
                        <text x="680" y="217" text-anchor="middle" fill="#c2410c" font-size="9"
                            font-family="monospace">/face/* | /proctoring/*</text>

                        <!-- Grading (AI Automatic scoring) -->
                        <rect x="615" y="285" width="130" height="55" rx="8" fill="#fff7ed" stroke="#f97316"
                            stroke-width="1.5" />
                        <text x="680" y="306" text-anchor="middle" fill="#7c2d12" font-size="11"
                            font-weight="bold">Grading AI</text>
                        <text x="680" y="322" text-anchor="middle" fill="#c2410c" font-size="9"
                            font-family="monospace">/grading/* | /results/*</text>

                        <!-- Connecting Lines -->
                        <!-- Admins/Candidates to Gateway -->
                        <path d="M 180 135 L 245 150" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
                        <path d="M 180 285 L 245 230" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
                        <path d="M 180 415 L 220 415 L 220 300 L 245 280" stroke="#64748b" stroke-dasharray="3 3"
                            stroke-width="1.2" marker-end="url(#arrow)" />

                        <!-- Redis cache flow -->
                        <path d="M 290 360 L 290 390" stroke="#059669" stroke-width="1.5"
                            marker-end="url(#arrow-emerald)" />
                        <path d="M 320 390 L 320 360" stroke="#059669" stroke-width="1.5"
                            marker-end="url(#arrow-emerald)" />

                        <!-- Dispatch lines from Gateway to services -->
                        <path d="M 375 140 L 410 140 L 410 102 L 440 102" stroke="#4f46e5" stroke-width="1.5"
                            marker-end="url(#arrow)" />
                        <path d="M 375 180 L 440 180" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arrow)" />
                        <path d="M 375 220 L 440 240" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arrow)" />
                        <path d="M 375 260 L 410 260 L 410 312 L 440 312" stroke="#4f46e5" stroke-width="1.5"
                            marker-end="url(#arrow)" />
                        <path d="M 375 300 L 400 300 L 400 382 L 440 382" stroke="#4f46e5" stroke-width="1.5"
                            marker-end="url(#arrow)" />

                        <!-- AI Routes Dispatch bypass -->
                        <path d="M 375 320 L 400 320 L 400 440 L 590 440 L 590 210 L 615 210" stroke="#f97316"
                            stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow)" />
                        <path d="M 375 340 L 385 340 L 385 460 L 600 460 L 600 312 L 615 312" stroke="#f97316"
                            stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow)" />

                        <!-- Internal Context Connections -->
                        <path d="M 505 130 L 505 145" stroke="#64748b" stroke-width="1" stroke-dasharray="2 2"
                            marker-end="url(#arrow)" />
                        <path d="M 680 235 L 680 285" stroke="#f97316" stroke-width="1.2" stroke-dasharray="4 4"
                            marker-end="url(#arrow)" />
                    </svg>
