<svg id="svg-deployment-standalone" viewBox="0 0 800 500" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <!-- Definitions for Grid Patterns and Markers -->
                        <defs>
                            <pattern id="grid-pattern" width="40" height="40" patternUnits="userSpaceOnUse">
                                <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.75" />
                            </pattern>
                            <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6"
                                markerHeight="6" orient="auto-start-reverse">
                                <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
                            </marker>
                            <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6"
                                markerHeight="6" orient="auto-start-reverse">
                                <path d="M 0 0 L 10 5 L 0 10 z" fill="#0d9488" />
                            </marker>
                            <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6"
                                markerHeight="6" orient="auto-start-reverse">
                                <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c" />
                            </marker>
                            <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6"
                                markerHeight="6" orient="auto-start-reverse">
                                <path d="M 0 0 L 10 5 L 0 10 z" fill="#9333ea" />
                            </marker>
                        </defs>

                        <rect width="100%" height="100%" fill="url(#grid-pattern)" rx="8" />

                        <!-- Client Network / Internet Zone (Left) -->
                        <rect x="15" y="55" width="160" height="390" rx="10" fill="#f8fafc" stroke="#cbd5e1"
                            stroke-width="1.5" stroke-dasharray="4 2" />
                        <text x="95" y="44" text-anchor="middle" fill="#475569" font-size="10" font-weight="700"
                            letter-spacing="1">CLIENT NETWORK</text>

                        <g transform="translate(25, 75)">
                            <rect width="140" height="40" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1" />
                            <text x="12" y="18" fill="#0f172a" font-size="9" font-weight="bold">Admin Browser</text>
                            <text x="12" y="30" fill="#64748b" font-size="8">Enterprise Web App</text>
                        </g>
                        <g transform="translate(25, 130)">
                            <rect width="140" height="40" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1" />
                            <text x="12" y="18" fill="#0f172a" font-size="9" font-weight="bold">Candidate Browser</text>
                            <text x="12" y="30" fill="#64748b" font-size="8">React Exam Client</text>
                        </g>
                        <g transform="translate(25, 185)">
                            <rect width="140" height="40" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"
                                stroke-dasharray="2 2" />
                            <text x="12" y="18" fill="#0f172a" font-size="9" font-weight="bold">Stripe Webhooks</text>
                            <text x="12" y="30" fill="#64748b" font-size="8">Billing Event Callbacks</text>
                        </g>

                        <!-- Docker Compose Host Container (Middle) -->
                        <rect x="195" y="25" width="410" height="450" rx="12" fill="#f0fdfa" fill-opacity="0.6"
                            stroke="#0d9488" stroke-width="1.5" />
                        <text x="400" y="42" text-anchor="middle" fill="#0f766e" font-size="11" font-weight="bold"
                            letter-spacing="1">DOCKER COMPOSE HOST (PRIVATE NETWORK)</text>

                        <!-- Public Edge -->
                        <rect x="210" y="55" width="380" height="60" rx="8" fill="#ecfdf5" stroke="#10b981"
                            stroke-width="1.5" />
                        <text x="220" y="75" fill="#065f46" font-size="10" font-weight="bold">Public Edge Container (GIN
                            GATEWAY)</text>
                        <text x="220" y="90" fill="#047857" font-size="8" font-family="monospace">Host :8080 ->
                            Container :8080 (Reverse Proxy Routing)</text>

                        <!-- Go Services Subgrid -->
                        <rect x="210" y="130" width="185" height="190" rx="8" fill="#eff6ff" stroke="#3b82f6"
                            stroke-width="1" stroke-dasharray="2 2" />
                        <text x="302" y="145" text-anchor="middle" fill="#1e3a8a" font-size="9" font-weight="bold">Go
                            Services (:8080)</text>

                        <g transform="translate(220, 155)">
                            <rect width="165" height="25" rx="4" fill="#ffffff" stroke="#93c5fd" stroke-width="1" />
                            <text x="8" y="16" fill="#1e40af" font-size="9" font-weight="600">Auth &amp; Enterprise
                                Svc</text>
                        </g>
                        <g transform="translate(220, 185)">
                            <rect width="165" height="25" rx="4" fill="#ffffff" stroke="#93c5fd" stroke-width="1" />
                            <text x="8" y="16" fill="#1e40af" font-size="9" font-weight="600">Exam Service</text>
                        </g>
                        <g transform="translate(220, 215)">
                            <rect width="165" height="25" rx="4" fill="#ffffff" stroke="#93c5fd" stroke-width="1" />
                            <text x="8" y="16" fill="#1e40af" font-size="9" font-weight="600">Candidate Service</text>
                        </g>
                        <g transform="translate(220, 245)">
                            <rect width="165" height="25" rx="4" fill="#ffffff" stroke="#93c5fd" stroke-width="1" />
                            <text x="8" y="16" fill="#1e40af" font-size="9" font-weight="600">Payment &amp; Notice
                                Svc</text>
                        </g>

                        <!-- Python AI Services Subgrid -->
                        <rect x="405" y="130" width="185" height="110" rx="8" fill="#fff7ed" stroke="#f97316"
                            stroke-width="1" stroke-dasharray="2 2" />
                        <text x="497" y="145" text-anchor="middle" fill="#7c2d12" font-size="9"
                            font-weight="bold">Python AI Services (:8000)</text>

                        <g transform="translate(415, 155)">
                            <rect width="165" height="25" rx="4" fill="#ffffff" stroke="#fdba74" stroke-width="1" />
                            <text x="8" y="16" fill="#7c2d12" font-size="9" font-weight="600">Proctoring Svc
                                (FastAPI)</text>
                        </g>
                        <g transform="translate(415, 185)">
                            <rect width="165" height="25" rx="4" fill="#ffffff" stroke="#fdba74" stroke-width="1" />
                            <text x="8" y="16" fill="#7c2d12" font-size="9" font-weight="600">Grading Svc
                                (FastAPI)</text>
                        </g>

                        <!-- Local Infrastructure Services -->
                        <rect x="210" y="335" width="380" height="125" rx="8" fill="#f8fafc" stroke="#64748b"
                            stroke-width="1" />
                        <text x="400" y="350" text-anchor="middle" fill="#334155" font-size="9"
                            font-weight="bold">Platform Infrastructure Services</text>

                        <g transform="translate(220, 360)">
                            <rect width="115" height="40" rx="4" fill="#ffffff" stroke="#475569" stroke-width="1" />
                            <text x="10" y="18" fill="#0f172a" font-size="9" font-weight="bold">PostgreSQL 15</text>
                            <text x="10" y="30" fill="#64748b" font-size="8">Multi-Tenant DBs</text>
                        </g>
                        <g transform="translate(345, 360)">
                            <rect width="110" height="40" rx="4" fill="#ffffff" stroke="#475569" stroke-width="1" />
                            <text x="10" y="18" fill="#0f172a" font-size="9" font-weight="bold">Redis 7</text>
                            <text x="10" y="30" fill="#64748b" font-size="8">Session/Limit Cache</text>
                        </g>
                        <g transform="translate(465, 360)">
                            <rect width="115" height="40" rx="4" fill="#ffffff" stroke="#475569" stroke-width="1" />
                            <text x="10" y="18" fill="#0f172a" font-size="9" font-weight="bold">Apache Kafka 4.2</text>
                            <text x="10" y="30" fill="#64748b" font-size="8">Internal Event Bus</text>
                        </g>

                        <!-- Schema details (Polished card to fix visual overflow issue) -->
                        <g transform="translate(220, 412)">
                            <rect x="0" y="0" width="360" height="34" rx="6" fill="#ffffff" stroke="#e2e8f0"
                                stroke-width="1" />
                            <text x="10" y="14" fill="#0f172a" font-size="8" font-family="monospace"
                                font-weight="bold">Logical Database Bindings:</text>
                            <text x="10" y="25" fill="#475569" font-size="7.5" font-family="monospace">veritas_[auth |
                                enterprise | exam | candidate | payment | proctor | grading]_db</text>
                        </g>

                        <!-- External Integrations (Right) -->
                        <rect x="620" y="55" width="165" height="390" rx="10" fill="#faf5ff" stroke="#a855f7"
                            stroke-width="1.5" stroke-dasharray="4 2" />
                        <text x="702" y="44" text-anchor="middle" fill="#6b21a8" font-size="10" font-weight="700"
                            letter-spacing="1">EXTERNAL CLOUDS</text>

                        <g transform="translate(630, 75)">
                            <rect width="145" height="35" rx="6" fill="#ffffff" stroke="#c084fc" stroke-width="1" />
                            <text x="8" y="15" fill="#3b0764" font-size="9" font-weight="bold">Cloudinary SaaS</text>
                            <text x="8" y="26" fill="#701a75" font-size="8">Static Media CDN</text>
                        </g>
                        <g transform="translate(630, 120)">
                            <rect width="145" height="35" rx="6" fill="#ffffff" stroke="#c084fc" stroke-width="1" />
                            <text x="8" y="15" fill="#3b0764" font-size="9" font-weight="bold">Stripe Payment</text>
                            <text x="8" y="26" fill="#701a75" font-size="8">Gateway Checkout</text>
                        </g>
                        <g transform="translate(630, 165)">
                            <rect width="145" height="35" rx="6" fill="#ffffff" stroke="#c084fc" stroke-width="1" />
                            <text x="8" y="15" fill="#3b0764" font-size="9" font-weight="bold">SMTP Mail Relay</text>
                            <text x="8" y="26" fill="#701a75" font-size="8">SendGrid / SES</text>
                        </g>

                        <!-- Google Cloud Run Node -->
                        <g transform="translate(630, 220)">
                            <rect width="145" height="65" rx="6" fill="#f0f9ff" stroke="#0284c7" stroke-width="1.5" />
                            <rect x="0" y="0" width="145" height="15" rx="3" fill="#0284c7" />
                            <text x="8" y="11" fill="#ffffff" font-size="8" font-weight="bold">Google Cloud Run</text>
                            <text x="8" y="32" fill="#0369a1" font-size="9" font-weight="bold">DeepFace API</text>
                            <text x="8" y="44" fill="#0284c7" font-size="8">Face Representation</text>
                            <text x="8" y="55" fill="#0284c7" font-size="8">&amp; Verification</text>
                        </g>

                        <!-- Hugging Face Space Node -->
                        <g transform="translate(630, 310)">
                            <rect width="145" height="45" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="1" />
                            <text x="8" y="15" fill="#78350f" font-size="9" font-weight="bold">Hugging Face Space</text>
                            <text x="8" y="27" fill="#92400e" font-size="8">Transformer Models</text>
                            <text x="8" y="38" fill="#92400e" font-size="8">Short-Answer Scorer</text>
                        </g>

                        <!-- Connections Mapping -->
                        <!-- Clients to Gateway -->
                        <path d="M 165 95 L 210 95" stroke="#0d9488" stroke-width="1.2" marker-end="url(#arrow-teal)" />
                        <path d="M 165 150 L 210 105" stroke="#0d9488" stroke-width="1.2"
                            marker-end="url(#arrow-teal)" />
                        <path d="M 165 205 L 180 205 L 180 115 L 210 115" stroke="#0d9488" stroke-width="1.2"
                            marker-end="url(#arrow-teal)" />

                        <!-- Gateway to Backend Network -->
                        <path d="M 390 115 L 302 115 L 302 130" stroke="#475569" stroke-width="1" stroke-dasharray="2 2"
                            marker-end="url(#arrow-blue)" />
                        <path d="M 405 115 L 497 115 L 497 130" stroke="#475569" stroke-width="1" stroke-dasharray="2 2"
                            marker-end="url(#arrow-orange)" />

                        <!-- Outbound connects to Cloud Integrations -->
                        <!-- Proctoring to Google Cloud Run -->
                        <path d="M 580 170 L 605 170 L 605 252 L 630 252" stroke="#0284c7" stroke-width="1.2"
                            marker-end="url(#arrow-blue)" />
                        <!-- Grading to HF space -->
                        <path d="M 580 200 L 615 200 L 615 332 L 630 332" stroke="#d97706" stroke-width="1.2"
                            marker-end="url(#arrow-orange)" />

                    </svg>