basePath: /
definitions:
  CandidateProfile:
    properties:
      createdAt:
        type: string
      email:
        type: string
      enterpriseId:
        type: string
      externalId:
        type: string
      firstName:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      lastName:
        type: string
    type: object
  EnrollmentStatus:
    enum:
    - Pending
    - Invited
    - Opened
    - Started
    - Completed
    - Revoked
    type: string
    x-enum-comments:
      StatusCompleted: candidate submitted the exam
      StatusInvited: notification email sent to candidate
      StatusOpened: candidate redeemed the invitation link
      StatusPending: enrolled, admin has not yet sent notification
      StatusRevoked: admin revoked access
      StatusStarted: candidate has an active exam session
    x-enum-descriptions:
    - enrolled, admin has not yet sent notification
    - notification email sent to candidate
    - candidate redeemed the invitation link
    - candidate has an active exam session
    - candidate submitted the exam
    - admin revoked access
    x-enum-varnames:
    - StatusPending
    - StatusInvited
    - StatusOpened
    - StatusStarted
    - StatusCompleted
    - StatusRevoked
  ExamEnrollment:
    properties:
      attemptsUsed:
        type: integer
      candidateId:
        type: string
      createdAt:
        type: string
      enterpriseId:
        type: string
      examId:
        type: string
      id:
        type: string
      invitationSentAt:
        type: string
      maxAttempts:
        type: integer
      status:
        $ref: '#/definitions/EnrollmentStatus'
      tokenExpiresAt:
        type: string
    type: object
  ExamSession:
    properties:
      answers:
        items:
          $ref: '#/definitions/SessionAnswer'
        type: array
      candidateId:
        type: string
      clientIp:
        type: string
      createdAt:
        type: string
      enrollmentId:
        type: string
      enterpriseId:
        type: string
      examId:
        type: string
      expiresAt:
        type: string
      faceRegisteredUrl:
        type: string
      id:
        type: string
      questions:
        description: Relations
        items:
          $ref: '#/definitions/SessionQuestion'
        type: array
      startedAt:
        type: string
      status:
        $ref: '#/definitions/SessionStatus'
      submission:
        $ref: '#/definitions/ExamSubmission'
      submittedAt:
        type: string
      terminatedAt:
        type: string
      terminationReason:
        type: string
      userAgent:
        type: string
    type: object
  ExamSubmission:
    properties:
      autoSubmitted:
        type: boolean
      createdAt:
        type: string
      id:
        type: string
      sessionId:
        type: string
      submittedAt:
        type: string
    type: object
  SessionAnswer:
    properties:
      answerData:
        items:
          type: integer
        type: array
      id:
        type: string
      isFinal:
        type: boolean
      savedAt:
        type: string
      sessionId:
        type: string
      sessionQuestionId:
        type: string
    type: object
  SessionQuestion:
    properties:
      id:
        type: string
      negativePoints:
        type: number
      orderIndex:
        type: integer
      points:
        type: integer
      questionId:
        type: string
      questionSnapshot:
        items:
          type: integer
        type: array
      sessionId:
        type: string
    type: object
  SessionStatus:
    enum:
    - Active
    - Submitted
    - Terminated
    - Expired
    type: string
    x-enum-varnames:
    - SessionActive
    - SessionSubmitted
    - SessionTerminated
    - SessionExpired
  ValidateAccessTokenResponse:
    properties:
      candidateId:
        type: string
      enrollmentId:
        type: string
      enterpriseId:
        type: string
      examId:
        type: string
    type: object
  AccessValidateResponse:
    properties:
      data:
        $ref: '#/definitions/ValidateAccessTokenResponse'
    type: object
  BulkUploadResponse:
    properties:
      count:
        type: integer
      message:
        type: string
    type: object
  CandidateCreateRequest:
    properties:
      email:
        type: string
      externalId:
        type: string
      firstName:
        type: string
      lastName:
        type: string
    required:
    - externalId
    - firstName
    - lastName
    type: object
  CandidateResponse:
    properties:
      data:
        $ref: '#/definitions/CandidateProfile'
    type: object
  CandidateUpdateRequest:
    properties:
      email:
        type: string
      firstName:
        type: string
      lastName:
        type: string
    required:
    - firstName
    - lastName
    type: object
  EnrollmentCreateResponse:
    properties:
      message:
        type: string
      results:
        items:
          $ref: '#/definitions/EnrollmentResultItem'
        type: array
    type: object
  EnrollmentRequest:
    properties:
      candidateIds:
        items:
          type: string
        minItems: 1
        type: array
      maxAttempts:
        minimum: 1
        type: integer
      tokenExpiresAt:
        type: string
    required:
    - candidateIds
    - maxAttempts
    - tokenExpiresAt
    type: object
  EnrollmentResponse:
    properties:
      data:
        $ref: '#/definitions/ExamEnrollment'
    type: object
  EnrollmentResultItem:
    properties:
      candidateId:
        type: string
      enrollmentId:
        type: string
      invitationUrl:
        type: string
      status:
        type: string
    type: object
  ErrorResponse:
    properties:
      error:
        type: string
    type: object
  InvitationLinkResponse:
    properties:
      enrollmentId:
        type: string
      invitationUrl:
        type: string
      status:
        type: string
      tokenExpiresAt:
        type: string
    type: object
  MessageResponse:
    properties:
      message:
        type: string
    type: object
  NotifyBulkRequest:
    properties:
      enrollmentIds:
        description: EnrollmentIDs is optional; if empty, all Pending/Invited enrollments
          for the exam are notified.
        items:
          type: string
        type: array
    type: object
  NotifyResponse:
    properties:
      message:
        type: string
      results:
        items:
          $ref: '#/definitions/NotifyResultItem'
        type: array
    type: object
  NotifyResultItem:
    properties:
      candidateId:
        type: string
      enrollmentId:
        type: string
      notifyStatus:
        description: 'NotifyStatus: "sent" | "skipped_no_email"'
        type: string
    type: object
  RedeemRequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  RedeemResponse:
    properties:
      token:
        type: string
    type: object
  SaveAnswerRequestSwag:
    properties:
      answerData:
        $ref: '#/definitions/SwaggerAnswerData'
      sessionQuestionId:
        type: string
    required:
    - answerData
    - sessionQuestionId
    type: object
  SessionAnswerListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/SessionAnswer'
        type: array
    type: object
  SessionQuestionListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/SessionQuestion'
        type: array
    type: object
  SessionResponse:
    properties:
      data:
        $ref: '#/definitions/ExamSession'
    type: object
  SubmissionResponse:
    properties:
      data:
        $ref: '#/definitions/ExamSubmission'
    type: object
  SubmitRequest:
    properties:
      autoSubmitted:
        type: boolean
    type: object
  SubmitResponse:
    properties:
      data:
        $ref: '#/definitions/ExamSubmission'
      message:
        type: string
    type: object
  SwaggerAnswerData:
    properties:
      selectedOptionIds:
        description: For MCQ and True/False Answer
        example:
        - 123e4567-e89b-12d3-a456-426614174000
        items:
          type: string
        type: array
      text:
        description: For Text or Essay Answer
        example: This is an essay answer.
        type: string
    type: object
  TerminateSessionRequest:
    properties:
      reason:
        type: string
    required:
    - reason
    type: object
  Metadata:
    properties:
      current_page:
        type: integer
      has_next:
        type: boolean
      has_previous:
        type: boolean
      page_size:
        type: integer
      total_elements:
        type: integer
      total_pages:
        type: integer
    type: object
  PaginatedResponse-CandidateProfile:
    properties:
      data:
        items:
          $ref: '#/definitions/CandidateProfile'
        type: array
      metadata:
        $ref: '#/definitions/Metadata'
    type: object
  PaginatedResponse-ExamEnrollment:
    properties:
      data:
        items:
          $ref: '#/definitions/ExamEnrollment'
        type: array
      metadata:
        $ref: '#/definitions/Metadata'
    type: object
  PaginatedResponse-ExamSession:
    properties:
      data:
        items:
          $ref: '#/definitions/ExamSession'
        type: array
      metadata:
        $ref: '#/definitions/Metadata'
    type: object
  PaginatedResponse-ExamSubmission:
    properties:
      data:
        items:
          $ref: '#/definitions/ExamSubmission'
        type: array
      metadata:
        $ref: '#/definitions/Metadata'
    type: object
info:
  contact:
    name: Veritas Platform Team
  description: Candidate lifecycle, enrollment, exam access, and session management
    service.
  title: Veritas Candidate Service API
  version: "1.0"
paths:
  /access/redeem:
    post:
      consumes:
      - application/json
      description: Exchange the opaque invitation code (from the URL query param)
        for a JWT. JWT is in the response body only.
      parameters:
      - description: Opaque code from invitation URL
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/RedeemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/RedeemResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Redeem invitation code
      tags:
      - enrollment
  /access/validate:
    post:
      consumes:
      - application/json
      description: Validate exam access token before session start.
      parameters:
      - description: Enrollment ID
        in: header
        name: X-Enrollment-Id
        required: true
        type: string
      - description: Enterprise ID
        in: header
        name: X-Enterprise-Id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/AccessValidateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Validate access token
      tags:
      - session
  /candidates:
    get:
      description: List candidate profiles for the caller enterprise with 
      parameters:
      - description: Enterprise ID (fallback if middleware context is absent)
        in: header
        name: X-Enterprise-Id
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 10, max 1000)
        in: query
        name: limit
        type: integer
      - description: 'Sort field: created_at|first_name|last_name|external_id'
        in: query
        name: sort
        type: string
      - description: 'Sort direction: asc|desc (default desc)'
        in: query
        name: sort_dir
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/PaginatedResponse-CandidateProfile'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: List candidates
      tags:
      - candidate
    post:
      consumes:
      - application/json
      description: Create one candidate profile under the caller enterprise.
      parameters:
      - description: Enterprise ID (fallback if middleware context is absent)
        in: header
        name: X-Enterprise-Id
        type: string
      - description: Candidate payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/CandidateCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/CandidateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Create candidate
      tags:
      - candidate
  /candidates/{candidateId}:
    delete:
      description: Permanently delete a candidate profile by ID and all associated
        enrollments/sessions.
      parameters:
      - description: Enterprise ID (fallback if middleware context is absent)
        in: header
        name: X-Enterprise-Id
        type: string
      - description: Candidate ID (UUID)
        in: path
        name: candidateId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Delete candidate
      tags:
      - candidate
    get:
      description: Get one candidate profile by ID for the caller enterprise.
      parameters:
      - description: Enterprise ID (fallback if middleware context is absent)
        in: header
        name: X-Enterprise-Id
        type: string
      - description: Candidate ID (UUID)
        in: path
        name: candidateId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/CandidateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Get candidate
      tags:
      - candidate
    patch:
      consumes:
      - application/json
      description: Update candidate profile fields by ID.
      parameters:
      - description: Enterprise ID (fallback if middleware context is absent)
        in: header
        name: X-Enterprise-Id
        type: string
      - description: Candidate ID (UUID)
        in: path
        name: candidateId
        required: true
        type: string
      - description: Updated candidate payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/CandidateUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Update candidate
      tags:
      - candidate
  /candidates/{candidateId}/activate:
    patch:
      description: Activate a candidate profile by ID.
      parameters:
      - description: Enterprise ID (fallback if middleware context is absent)
        in: header
        name: X-Enterprise-Id
        type: string
      - description: Candidate ID (UUID)
        in: path
        name: candidateId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Activate candidate
      tags:
      - candidate
  /candidates/{candidateId}/deactivate:
    patch:
      description: Soft-deactivate a candidate profile by ID.
      parameters:
      - description: Enterprise ID (fallback if middleware context is absent)
        in: header
        name: X-Enterprise-Id
        type: string
      - description: Candidate ID (UUID)
        in: path
        name: candidateId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Deactivate candidate
      tags:
      - candidate
  /candidates/bulk:
    post:
      consumes:
      - multipart/form-data
      description: |-
        Create many candidate profiles from a CSV file (max 5MB).
        The CSV should have the following columns in order:
        external_id (required), first_name (required), last_name (required), email (optional).
        The first row is expected to be a header and will be skipped.
      parameters:
      - description: Enterprise ID (fallback if middleware context is absent)
        in: header
        name: X-Enterprise-Id
        type: string
      - description: CSV file (max 5MB)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/BulkUploadResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Bulk upload candidates
      tags:
      - candidate
  /enrollments/{enrollmentId}:
    delete:
      description: Delete an enrollment. Only allowed if status is Pending.
      parameters:
      - description: Enterprise ID
        in: header
        name: X-Enterprise-Id
        type: string
      - description: Enrollment ID (UUID)
        in: path
        name: enrollmentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Delete enrollment
      tags:
      - enrollment
    get:
      description: Get one enrollment by ID.
      parameters:
      - description: Enterprise ID
        in: header
        name: X-Enterprise-Id
        type: string
      - description: Enrollment ID (UUID)
        in: path
        name: enrollmentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/EnrollmentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Get enrollment
      tags:
      - enrollment
  /enrollments/{enrollmentId}/link:
    get:
      description: Generate a fresh invitation URL (opaque code) for manual distribution.
        Old URL is invalidated.
      parameters:
      - description: Enterprise ID
        in: header
        name: X-Enterprise-Id
        type: string
      - description: Enrollment ID (UUID)
        in: path
        name: enrollmentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/InvitationLinkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Get invitation link
      tags:
      - enrollment
  /enrollments/{enrollmentId}/notify:
    post:
      description: Send or resend an invitation email to one candidate enrollment.
      parameters:
      - description: Enterprise ID
        in: header
        name: X-Enterprise-Id
        type: string
      - description: Enrollment ID (UUID)
        in: path
        name: enrollmentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/NotifyResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Notify single candidate
      tags:
      - enrollment
  /enrollments/{enrollmentId}/reset-attempts:
    post:
      description: Reset attempts_used to zero for an enrollment.
      parameters:
      - description: Enterprise ID
        in: header
        name: X-Enterprise-Id
        type: string
      - description: Enrollment ID (UUID)
        in: path
        name: enrollmentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Reset enrollment attempts
      tags:
      - enrollment
  /enrollments/{enrollmentId}/revoke:
    patch:
