<!-- Face Verification -->
<section class="section" data-service="face">
    <div class="section-header">
        <h2>Face Verification</h2>
        <span class="section-count">2 endpoints</span>
    </div>
    <div class="endpoint-list">
        <h3 class="endpoint-group-title">Biometric Operations</h3>
        <endpoint-item method="POST" path="/face/register">
            <span class="badge badge-candidate">ExamCandidate</span>
            <span class="badge badge-premium">Premium</span>
        </endpoint-item>
        <endpoint-item method="POST" path="/face/verify">
            <span class="badge badge-candidate">ExamCandidate</span>
            <span class="badge badge-premium">Premium</span>
        </endpoint-item>
    </div>
</section>
