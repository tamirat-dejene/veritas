    <!-- Reporting & Analytics -->
    <section class="section" data-service="reporting">
      <div class="section-header">
        <h2>Reporting & Analytics</h2>
        <span class="section-count">5 endpoints</span>
      </div>
      <div class="endpoint-list">
        <div class="endpoint-item">
          <span class="method get">GET</span>
          <span class="endpoint-path">/dashboard/metrics</span>
          <div class="access-badges">
            <span class="badge badge-admin">EnterpriseAdmin</span>
            <span class="badge badge-staff">EnterpriseStaff</span>
          </div>
          <button class="copy-btn" data-path="/dashboard/metrics">
            <svg class="copy-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z">
              </path>
            </svg>
            <span class="copy-text">Copy</span>
          </button>
        </div>
        <div class="endpoint-item">
          <span class="method get">GET</span>
          <span class="endpoint-path">/monitoring/exams/:examId</span>
          <div class="access-badges">
            <span class="badge badge-admin">EnterpriseAdmin</span>
          </div>
          <button class="copy-btn" data-path="/monitoring/exams/:examId">
            <svg class="copy-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z">
              </path>
            </svg>
            <span class="copy-text">Copy</span>
          </button>
        </div>
        <div class="endpoint-item">
          <span class="method post">POST</span>
          <span class="endpoint-path">/reports</span>
          <div class="access-badges">
            <span class="badge badge-admin">EnterpriseAdmin</span>
          </div>
          <button class="copy-btn" data-path="/reports">
            <svg class="copy-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z">
              </path>
            </svg>
            <span class="copy-text">Copy</span>
          </button>
        </div>
        <div class="endpoint-item">
          <span class="method get">GET</span>
          <span class="endpoint-path">/reports/:reportId/export</span>
          <div class="access-badges">
            <span class="badge badge-admin">EnterpriseAdmin</span>
          </div>
          <button class="copy-btn" data-path="/reports/:reportId/export">
            <svg class="copy-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z">
              </path>
            </svg>
            <span class="copy-text">Copy</span>
          </button>
        </div>
        <div class="endpoint-item">
          <span class="method get">GET</span>
          <span class="endpoint-path">/audit/logs</span>
          <div class="access-badges">
            <span class="badge badge-super">SystemAdmin</span>
            <span class="badge badge-admin">EnterpriseAdmin</span>
          </div>
          <button class="copy-btn" data-path="/audit/logs">
            <svg class="copy-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z">
              </path>
            </svg>
            <span class="copy-text">Copy</span>
          </button>
        </div>
      </div>
    </section>
