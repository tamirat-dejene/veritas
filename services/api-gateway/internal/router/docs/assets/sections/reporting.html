<!-- Reporting & Analytics -->
<section class="section" data-service="reporting">
    <div class="section-header">
        <h2>Reporting & Analytics</h2>
        <span class="section-count">5 endpoints</span>
    </div>
    <div class="endpoint-list">
        <h3 class="endpoint-group-title">Dashboards & Monitoring</h3>
        <endpoint-item method="GET" path="/dashboard/metrics">
            <span class="badge badge-admin">EnterpriseAdmin</span>
            <span class="badge badge-staff">EnterpriseStaff</span>
        </endpoint-item>
        <endpoint-item method="GET" path="/monitoring/exams/:examId">
            <span class="badge badge-admin">EnterpriseAdmin</span>
        </endpoint-item>
        <h3 class="endpoint-group-title">Reports & Audit</h3>
        <endpoint-item method="POST" path="/reports">
            <span class="badge badge-admin">EnterpriseAdmin</span>
        </endpoint-item>
        <endpoint-item method="GET" path="/reports/:reportId/export">
            <span class="badge badge-admin">EnterpriseAdmin</span>
        </endpoint-item>
        <endpoint-item method="GET" path="/audit/logs">
            <span class="badge badge-super">SystemAdmin</span>
            <span class="badge badge-admin">EnterpriseAdmin</span>
        </endpoint-item>
    </div>
</section>
