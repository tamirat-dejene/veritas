<!-- Authentication -->
<section class="section" data-service="auth">
    <div class="section-header">
        <h2>Authentication</h2>
        <span class="section-count">3 endpoints</span>
    </div>
    <div class="endpoint-list">
        <h3 class="endpoint-group-title">Token & Session</h3>
        <endpoint-item method="POST" path="/auth/login">
            <span class="badge badge-public">Public</span>
        </endpoint-item>
        <endpoint-item method="POST" path="/auth/refresh">
            <span class="badge badge-public">Public</span>
        </endpoint-item>
        <endpoint-item method="POST" path="/auth/logout">
            <span class="badge badge-all">All</span>
        </endpoint-item>
    </div>
</section>
