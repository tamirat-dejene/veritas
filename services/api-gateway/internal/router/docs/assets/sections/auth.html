    <!-- Authentication -->
    <section class="section" data-service="auth">
      <div class="section-header">
        <h2>Authentication</h2>
        <span class="section-count">3 endpoints</span>
      </div>
      <div class="endpoint-list">
         <h3 class="endpoint-group-title">Token & Session</h3>
        <div class="endpoint-item">
          <span class="method post">POST</span>
          <span class="endpoint-path">/auth/login</span>
          <div class="access-badges">
            <span class="badge badge-public">Public</span>
          </div>
          <button class="copy-btn" data-path="/auth/login">
            <svg class="copy-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z">
              </path>
            </svg>
            <span class="copy-text">Copy</span>
          </button>
        </div>
        <div class="endpoint-item">
          <span class="method post">POST</span>
          <span class="endpoint-path">/auth/refresh</span>
          <div class="access-badges">
            <span class="badge badge-public">Public</span>
          </div>
          <button class="copy-btn" data-path="/auth/refresh">
            <svg class="copy-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z">
              </path>
            </svg>
            <span class="copy-text">Copy</span>
          </button>
        </div>
        <div class="endpoint-item">
          <span class="method post">POST</span>
          <span class="endpoint-path">/auth/logout</span>
          <div class="access-badges">
            <span class="badge badge-all">All</span>
          </div>
          <button class="copy-btn" data-path="/auth/logout">
            <svg class="copy-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z">
              </path>
            </svg>
            <span class="copy-text">Copy</span>
          </button>
        </div>
      </div>
    </section>
