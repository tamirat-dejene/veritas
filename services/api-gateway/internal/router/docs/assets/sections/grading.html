    <!-- Grading & Results -->
    <section class="section" data-service="grading">
      <div class="section-header">
        <h2>Grading & Results</h2>
        <span class="section-count">4 endpoints</span>
      </div>
      <div class="endpoint-list">
         <h3 class="endpoint-group-title">Scoring</h3>
        <div class="endpoint-item">
          <span class="method post">POST</span>
          <span class="endpoint-path">/grading/auto</span>
          <div class="access-badges">
            <span class="badge badge-system">EnterpriseAuto</span>
          </div>
          <button class="copy-btn" data-path="/grading/auto">
            <svg class="copy-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z">
              </path>
            </svg>
            <span class="copy-text">Copy</span>
          </button>
        </div>
        <div class="endpoint-item">
          <span class="method post">POST</span>
          <span class="endpoint-path">/grading/manual</span>
          <div class="access-badges">
            <span class="badge badge-enterprise-staff">EnterpriseStaff</span>
          </div>
          <button class="copy-btn" data-path="/grading/manual">
            <svg class="copy-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z">
              </path>
            </svg>
            <span class="copy-text">Copy</span>
          </button>
        </div>
         <h3 class="endpoint-group-title">Results & Certificates</h3>
        <div class="endpoint-item">
          <span class="method get">GET</span>
          <span class="endpoint-path">/results/:examId</span>
          <div class="access-badges">
            <span class="badge badge-admin">EnterpriseAdmin</span>
          </div>
          <button class="copy-btn" data-path="/results/:examId">
            <svg class="copy-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z">
              </path>
            </svg>
            <span class="copy-text">Copy</span>
          </button>
        </div>
        <div class="endpoint-item">
          <span class="method get">GET</span>
          <span class="endpoint-path">/certificates/:certificateId</span>
          <div class="access-badges">
            <span class="badge badge-candidate">ExamCandidate</span>
          </div>
          <button class="copy-btn" data-path="/certificates/:certificateId">
            <svg class="copy-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z">
              </path>
            </svg>
            <span class="copy-text">Copy</span>
          </button>
        </div>
      </div>
    </section>
