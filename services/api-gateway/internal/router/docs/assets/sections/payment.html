<!-- Payments & Subscriptions -->
<section class="section" data-service="payment">
    <div class="section-header">
        <h2>Payments & Subscriptions</h2>
        <span class="section-count">5 endpoints</span>
    </div>
    <div class="endpoint-list">
        <h3 class="endpoint-group-title">Subscription Management</h3>
        <endpoint-item method="GET" path="/subscriptions/plans">
            <span class="badge badge-public">Public</span>
        </endpoint-item>
        <endpoint-item method="POST" path="/subscriptions/:enterpriseId/upgrade">
            <span class="badge badge-admin">EnterpriseAdmin</span>
        </endpoint-item>
        <h3 class="endpoint-group-title">Billing Operations</h3>
        <endpoint-item method="POST" path="/webhooks/stripe">
            <span class="badge badge-public">Public</span>
        </endpoint-item>
        <endpoint-item method="GET" path="/payments/history">
            <span class="badge badge-admin">EnterpriseAdmin</span>
        </endpoint-item>
        <endpoint-item method="GET" path="/invoices/:invoiceId">
            <span class="badge badge-admin">EnterpriseAdmin</span>
        </endpoint-item>
    </div>
</section>
