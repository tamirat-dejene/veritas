    <!-- Proctoring -->
    <section class="section" data-service="proctoring">
      <div class="section-header">
        <h2>Proctoring</h2>
        <span class="section-count">2 endpoints</span>
      </div>
      <div class="endpoint-list">
         <h3 class="endpoint-group-title">Session Events</h3>
        <div class="endpoint-item">
          <span class="method post">POST</span>
          <span class="endpoint-path">/proctoring/events</span>
          <div class="access-badges">
            <span class="badge badge-candidate">ExamCandidate</span>
          </div>
          <button class="copy-btn" data-path="/proctoring/events">
            <svg class="copy-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z">
              </path>
            </svg>
            <span class="copy-text">Copy</span>
          </button>
        </div>
        <div class="endpoint-item">
          <span class="method get">GET</span>
          <span class="endpoint-path">/proctoring/sessions/:sessionId/events</span>
          <div class="access-badges">
            <span class="badge badge-admin">EnterpriseAdmin</span>
          </div>
          <button class="copy-btn" data-path="/proctoring/sessions/:sessionId/events">
            <svg class="copy-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z">
              </path>

          </button>
        </div>
      </div>
