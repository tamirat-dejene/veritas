<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Veritas API Gateway - Documentation</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">V</div>
                <div class="logo-text">
                    <h1>Veritas API Gateway</h1>
                    <span class="version">v1.0</span>
                </div>
            </div>
            <div class="search-container">
                <input type="text" id="searchBox" class="search-box" placeholder="Search endpoints..."
                    autocomplete="off" />
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Legend -->
        <div class="legend">
            <h3>Access Control Roles</h3>
            <div class="badge-row">
                <span class="badge badge-public">Public</span>
                <span class="badge badge-all">All</span>
                <span class="badge badge-candidate">ExamCandidate</span>
                <span class="badge badge-admin">EnterpriseAdmin</span>
                <span class="badge badge-staff">EnterpriseStaff</span>
                <span class="badge badge-super">SystemAdmin</span>
                <span class="badge badge-system">EnterpriseAuto</span>
                <span class="badge badge-premium">Premium</span>
            </div>
        </div>

        <div class="legend swagger-links">
            <h3>Service Swagger Docs</h3>
            <div class="doc-links-row">
                <a href="/swagger/auth/index.html" target="_blank" rel="noopener noreferrer">Auth Service Swagger</a>
            </div>
        </div>

        <div id="serviceSections" data-section-base="assets/sections"></div>

    </main>

    <!-- Footer -->
    <footer>
        <p>Veritas API Gateway • Version 1.0 • Documentation</p>
    </footer>

    <script src="assets/js/docs-page.js"></script>
</body>

</html>
