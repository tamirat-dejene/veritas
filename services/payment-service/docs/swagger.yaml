basePath: /
definitions:
  github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.BillingCycle:
    enum:
    - monthly
    - yearly
    type: string
    x-enum-varnames:
    - BillingCycleMonthly
    - BillingCycleYearly
  github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.BillingSummary:
    properties:
      active_plan_name:
        type: string
      last_payment:
        $ref: '#/definitions/github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.Payment'
      next_billing_date:
        type: string
      outstanding_balance:
        type: number
      subscription_status:
        $ref: '#/definitions/github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.SubscriptionStatus'
      total_paid_ytd:
        type: number
    type: object
  github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.Currency:
    enum:
    - ETB
    - USD
    - EUR
    - GBP
    type: string
    x-enum-varnames:
    - CurrencyETB
    - CurrencyUSD
    - CurrencyEUR
    - CurrencyGBP
  github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.EnterpriseSubscription:
    properties:
      cancel_at_period_end:
        type: boolean
      canceled_at:
        type: string
      created_at:
        type: string
      current_period_end:
        type: string
      current_period_start:
        type: string
      ended_at:
        type: string
      enterprise_id:
        type: string
      id:
        type: string
      plan_id:
        type: string
      status:
        $ref: '#/definitions/github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.SubscriptionStatus'
      stripe_customer_id:
        type: string
      stripe_subscription_id:
        type: string
      updated_at:
        type: string
    type: object
  github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.Invoice:
    properties:
      amount_due:
        type: number
      amount_paid:
        type: number
      amount_remaining:
        type: number
      created_at:
        type: string
      currency:
        $ref: '#/definitions/github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.Currency'
      due_date:
        type: string
      enterprise_id:
        type: string
      hosted_invoice_url:
        type: string
      id:
        type: string
      invoice_pdf_url:
        type: string
      number:
        type: string
      paid_at:
        type: string
      status:
        $ref: '#/definitions/github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.InvoiceStatus'
      subscription_id:
        type: string
      updated_at:
        type: string
    type: object
  github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.InvoiceStatus:
    enum:
    - Draft
    - Open
    - Paid
    - Void
    - Uncollectible
    type: string
    x-enum-varnames:
    - InvoiceStatusDraft
    - InvoiceStatusOpen
    - InvoiceStatusPaid
    - InvoiceStatusVoid
    - InvoiceStatusUncollectible
  github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.Payment:
    properties:
      amount:
        type: number
      created_at:
        type: string
      currency:
        $ref: '#/definitions/github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.Currency'
      enterprise_id:
        type: string
      id:
        type: string
      invoice_id:
        type: string
      payment_method_type:
        type: string
      provider:
        type: string
      provider_error_code:
        type: string
      provider_error_message:
        type: string
      provider_payment_id:
        type: string
      status:
        $ref: '#/definitions/github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.PaymentStatus'
    type: object
  github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.PaymentStatus:
    enum:
    - Pending
    - Succeeded
    - Failed
    - Refunded
    type: string
    x-enum-varnames:
    - PaymentStatusPending
    - PaymentStatusSucceeded
    - PaymentStatusFailed
    - PaymentStatusRefunded
  github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.SubscriptionPlan:
    properties:
      billing_cycle:
        $ref: '#/definitions/github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.BillingCycle'
      created_at:
        type: string
      currency:
        $ref: '#/definitions/github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.Currency'
      description:
        type: string
      features:
        additionalProperties: {}
        type: object
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      price:
        type: number
      slug:
        type: string
      stripe_price_id:
        type: string
      updated_at:
        type: string
    type: object
  github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.SubscriptionStatus:
    enum:
    - Active
    - PastDue
    - Canceled
    - Expired
    - Trial
    type: string
    x-enum-varnames:
    - SubStatusActive
    - SubStatusPastDue
    - SubStatusCanceled
    - SubStatusExpired
    - SubStatusTrial
  internal_handler.AdminSetSubscriptionRequest:
    properties:
      period_end:
        type: string
      period_start:
        type: string
      plan_id:
        type: string
      status:
        type: string
    required:
    - plan_id
    - status
    type: object
  internal_handler.CancelSubscriptionRequest:
    properties:
      cancel_at_period_end:
        description: |-
          When true, the subscription remains active until the current period ends.
          When false (default), it is canceled immediately.
        type: boolean
    type: object
  internal_handler.CheckoutURLResponse:
    properties:
      checkout_url:
        type: string
    type: object
  internal_handler.CreatePlanRequest:
    properties:
      billing_cycle:
        type: string
      currency:
        type: string
      description:
        type: string
      features:
        additionalProperties: {}
        type: object
      is_active:
        type: boolean
      name:
        type: string
      price:
        type: number
      slug:
        type: string
      stripe_price_id:
        type: string
    required:
    - billing_cycle
    - currency
    - name
    - price
    - slug
    - stripe_price_id
    type: object
  internal_handler.CreateTrialRequest:
    properties:
      plan_id:
        type: string
      trial_days:
        type: integer
    required:
    - plan_id
    - trial_days
    type: object
  internal_handler.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  internal_handler.RefundRequest:
    properties:
      amount:
        type: number
      reason:
        type: string
    required:
    - amount
    type: object
  internal_handler.UpdatePlanRequest:
    properties:
      billing_cycle:
        type: string
      currency:
        type: string
      description:
        type: string
      features:
        additionalProperties: {}
        type: object
      is_active:
        type: boolean
      name:
        type: string
      price:
        type: number
      slug:
        type: string
      stripe_price_id:
        type: string
    type: object
  internal_handler.UpgradeSubscriptionRequest:
    properties:
      plan_id:
        type: string
    required:
    - plan_id
    type: object
  internal_handler.UsageResponse:
    properties:
      plan_features:
        additionalProperties: {}
        type: object
    type: object
  pagination.Metadata:
    properties:
      current_page:
        type: integer
      has_next:
        type: boolean
      has_previous:
        type: boolean
      page_size:
        type: integer
      total_elements:
        type: integer
      total_pages:
        type: integer
    type: object
  pagination.PaginatedResponse-github_com_tamirat-dejene_veritas_services_payment-service_internal_domain_Invoice:
    properties:
      data:
        items:
          $ref: '#/definitions/github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.Invoice'
        type: array
      metadata:
        $ref: '#/definitions/pagination.Metadata'
    type: object
  pagination.PaginatedResponse-github_com_tamirat-dejene_veritas_services_payment-service_internal_domain_Payment:
    properties:
      data:
        items:
          $ref: '#/definitions/github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.Payment'
        type: array
      metadata:
        $ref: '#/definitions/pagination.Metadata'
    type: object
  pagination.PaginatedResponse-github_com_tamirat-dejene_veritas_services_payment-service_internal_domain_SubscriptionPlan:
    properties:
      data:
        items:
          $ref: '#/definitions/github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.SubscriptionPlan'
        type: array
      metadata:
        $ref: '#/definitions/pagination.Metadata'
    type: object
info:
  contact:
    name: Veritas Platform Team
  description: Subscription plans, upgrades, cancellations, invoice retrieval, payment
    history, and Stripe webhook processing.
  title: Veritas Payment Service API
  version: "1.0"
paths:
  /admin/invoices/{invoiceId}/refund:
    post:
      consumes:
      - application/json
      description: Refunds a specific invoice by its ID.
      parameters:
      - description: Invoice ID (UUID)
        in: path
        name: invoiceId
        required: true
        type: string
      - description: Refund request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.RefundRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: Refund invoice
      tags:
      - admin
  /admin/plans:
    get:
      description: Returns all subscription plans, including inactive ones.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 10)
        in: query
        name: limit
        type: integer
      - description: 'Sort field (allowed: price, name, created_at; default: created_at)'
        in: query
        name: sort
        type: string
      - description: Sort direction (asc/desc)
        in: query
        name: sort_dir
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pagination.PaginatedResponse-github_com_tamirat-dejene_veritas_services_payment-service_internal_domain_SubscriptionPlan'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: Admin list plans
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: System admin creates a new subscription plan.
      parameters:
      - description: Plan details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CreatePlanRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.SubscriptionPlan'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: Create plan
      tags:
      - admin
  /admin/plans/{planId}:
    delete:
      description: Sets is_active = false for a plan.
      parameters:
      - description: Plan ID (UUID)
        in: path
        name: planId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: Deactivate plan
      tags:
      - admin
    patch:
      consumes:
      - application/json
      description: System admin updates an existing subscription plan.
      parameters:
      - description: Plan ID (UUID)
        in: path
        name: planId
        required: true
        type: string
      - description: Plan updates
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.UpdatePlanRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.SubscriptionPlan'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: Update plan
      tags:
      - admin
  /admin/subscriptions/{enterpriseId}:
    post:
      consumes:
      - application/json
      description: Manually override an enterprise's subscription plan and status
        (no Stripe call).
      parameters:
      - description: Enterprise ID (UUID)
        in: path
        name: enterpriseId
        required: true
        type: string
      - description: Subscription override
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.AdminSetSubscriptionRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: Admin set subscription
      tags:
      - subscription
  /admin/subscriptions/{enterpriseId}/trial:
    post:
      consumes:
      - application/json
      description: Starts a free trial subscription without a payment method.
      parameters:
      - description: Enterprise ID (UUID)
        in: path
        name: enterpriseId
        required: true
        type: string
      - description: Trial request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CreateTrialRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: Create trial subscription
      tags:
      - admin
  /billing/summary:
    get:
      description: Returns aggregated billing details including current plan, subscription
        status, and balances.
      parameters:
      - description: Enterprise ID (UUID)
        in: header
        name: X-Enterprise-ID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.BillingSummary'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: Get billing summary
      tags:
      - billing
  /billing/usage/{enterpriseId}:
    get:
      description: Returns the features JSONB for the active subscription plan. Used
        internally by other services.
      parameters:
      - description: Enterprise ID (UUID)
        in: path
        name: enterpriseId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.UsageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: Get plan features (Internal)
      tags:
      - internal
  /health:
    get:
      description: Returns a simple JSON indicating the service is alive.
      operationId: healthCheck
      produces:
      - application/json
      responses:
        "200":
          description: Service is healthy
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - system
  /invoices:
    get:
      description: Returns invoices for the specified enterprise.
      parameters:
      - description: Enterprise ID (UUID)
        in: header
        name: X-Enterprise-ID
        required: true
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 10)
        in: query
        name: limit
        type: integer
      - description: 'Sort field (allowed: amount_due, amount_paid, amount_remaining,
          due_date, status, created_at; default: created_at)'
        in: query
        name: sort
        type: string
      - description: Sort direction (asc/desc)
        in: query
        name: sort_dir
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pagination.PaginatedResponse-github_com_tamirat-dejene_veritas_services_payment-service_internal_domain_Invoice'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: List invoices
      tags:
      - payment
  /invoices/{invoiceId}:
    get:
      description: Fetch a single invoice by invoice ID.
      parameters:
      - description: Invoice ID (UUID)
        in: path
        name: invoiceId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.Invoice'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: Get invoice
      tags:
      - payment
  /payments/history:
    get:
      description: Returns payment history for the specified enterprise.
      parameters:
      - description: Enterprise ID
        in: header
        name: X-Enterprise-ID
        required: true
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 10)
        in: query
        name: limit
        type: integer
      - description: 'Sort field (allowed: amount, status, payment_method_type, created_at;
          default: created_at)'
        in: query
        name: sort
        type: string
      - description: Sort direction (asc/desc)
        in: query
        name: sort_dir
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pagination.PaginatedResponse-github_com_tamirat-dejene_veritas_services_payment-service_internal_domain_Payment'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: List payment history
      tags:
      - payment
  /subscriptions/{enterpriseId}:
    get:
      description: Returns the current subscription state for an enterprise.
      parameters:
      - description: Enterprise ID (UUID)
        in: path
        name: enterpriseId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tamirat-dejene_veritas_services_payment-service_internal_domain.EnterpriseSubscription'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: Get active subscription
      tags:
      - subscription
  /subscriptions/{enterpriseId}/cancel:
    post:
      consumes:
      - application/json
      description: Cancels an enterprise subscription immediately or at period end.
      parameters:
      - description: Enterprise ID (UUID)
        in: path
        name: enterpriseId
        required: true
        type: string
      - description: Cancel options
        in: body
        name: body
        schema:
          $ref: '#/definitions/internal_handler.CancelSubscriptionRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: Cancel subscription
      tags:
      - subscription
  /subscriptions/{enterpriseId}/reactivate:
    post:
      description: Cancels a pending period-end cancellation, keeping the subscription
        active.
      parameters:
      - description: Enterprise ID (UUID)
        in: path
        name: enterpriseId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: Reactivate subscription
      tags:
      - subscription
  /subscriptions/{enterpriseId}/upgrade:
    post:
      consumes:
      - application/json
      description: Creates a provider checkout session for upgrading an enterprise
        subscription plan.
      parameters:
      - description: Enterprise ID (UUID)
        in: path
        name: enterpriseId
        required: true
        type: string
      - description: Upgrade request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.UpgradeSubscriptionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.CheckoutURLResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: Upgrade enterprise subscription
      tags:
      - subscription
  /subscriptions/plans:
    get:
      description: Returns all available subscription plans.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 10)
        in: query
        name: limit
        type: integer
      - description: 'Sort field (allowed: price, name, created_at; default: created_at)'
        in: query
        name: sort
        type: string
      - description: Sort direction (asc/desc)
        in: query
        name: sort_dir
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pagination.PaginatedResponse-github_com_tamirat-dejene_veritas_services_payment-service_internal_domain_SubscriptionPlan'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: List subscription plans
      tags:
      - subscription
  /webhooks/stripe:
    post:
      consumes:
      - application/json
      description: Validates and processes Stripe webhook event payload.
      parameters:
