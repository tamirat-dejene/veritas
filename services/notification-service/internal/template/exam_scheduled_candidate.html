<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Inter', sans-serif; line-height: 1.6; color: #1e293b; background-color: #f8fafc; margin: 0; }
        .container { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .header { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); padding: 32px; text-align: center; color: white; }
        .content { padding: 32px; }
        .info-box { background: #f1f5f9; padding: 20px; border-radius: 8px; margin-top: 20px; border-left: 4px solid #6366f1; }
        .footer { padding: 24px; text-align: center; font-size: 14px; color: #64748b; }
        .button { display: inline-block; padding: 12px 24px; background: #4f46e5; color: white; text-decoration: none; border-radius: 6px; font-weight: 600; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>Upcoming Exam</h1></div>
        <div class="content">
            <p>Hello,</p>
            <p>You have been enrolled in <span style="font-weight:700">"{{.Title}}"</span>. Please review the details below:</p>
            <div class="info-box">
                <p style="margin:0"><strong>Window Opens:</strong> {{.StartTime}}</p>
                <p style="margin:5px 0 0 0"><strong>Window Closes:</strong> {{.EndTime}}</p>
            </div>
            <p>Make sure to test your system and internet connection before the exam starts.</p>
            <a href="#" class="button">View Exam Instructions</a>
        </div>
        <div class="footer">&copy; 2026 Veritas AI</div>
    </div>
</body>
</html>
