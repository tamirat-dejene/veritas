<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Password Changed: {{.Name}}</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; color: #333333; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; background-color: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        .footer { margin-top: 40px; font-size: 12px; color: #777777; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Password Changed</h1>
        <p>Dear {{.Name}},</p>
        <p>The password for your user account under <strong>{{.EnterpriseName}}</strong> has been successfully changed.</p>
        <p>If you did not perform this action, please contact your system administrator or support immediately.</p>
        <div class="footer"><p>&copy; Veritas Platform. All rights reserved.</p></div>
    </div>
</body>
</html>
