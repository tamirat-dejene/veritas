<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Inter', sans-serif; line-height: 1.6; color: #1e293b; background-color: #f8fafc; margin: 0; }
        .container { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .header { background: linear-gradient(135deg, #10b981 0%, #059669 100%); padding: 32px; text-align: center; color: white; }
        .content { padding: 32px; }
        .button { display: inline-block; padding: 14px 28px; background: #10b981; color: white; text-decoration: none; border-radius: 8px; font-weight: 700; margin-top: 24px; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2); }
        .footer { padding: 24px; text-align: center; font-size: 14px; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>Exam is Live!</h1></div>
        <div class="content">
            <p>Hello,</p>
            <p>Great news! The exam <span style="font-weight:700">"{{.Title}}"</span> is now open for participants.</p>
            <p>You can begin your examination session immediately by clicking the button below.</p>
            <a href="#" class="button">Start Exam Now</a>
        </div>
        <div class="footer">&copy; 2026 Veritas AI</div>
    </div>
</body>
</html>
