services:
  # --- Infrastructure ---
  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      # interval: 10s
      # timeout: 5s
      # retries: 5
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      # interval: 10s
      # timeout: 5s
      # retries: 5

  # prometheus:
  #   image: prom/prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml 

  # grafana:
  #   image: grafana/grafana
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - prometheus

  # --- Go Services ---
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./shared:/app/shared:ro
    env_file:
      - .env
    depends_on:
      auth-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      # interval: 10s
      # timeout: 5s
      # retries: 5
    develop:
      watch:
        - action: rebuild
          path: ./services/api-gateway

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "8081:8080"
    volumes:
      - ./shared:/app/shared:ro
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      # interval: 10s
      # timeout: 5s
      # retries: 5
    develop:
      watch:
        - action: rebuild
          path: ./services/auth-service

  enterprise-service:
    build:
      context: .
      dockerfile: services/enterprise-service/Dockerfile
    ports:
      - "8082:8080"
    volumes:
      - ./shared:/app/shared:ro
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      # interval: 10s
      # timeout: 5s
      # retries: 5
    develop:
      watch:
        - action: rebuild
          path: ./services/enterprise-service

  exam-service:
    build:
      context: .
      dockerfile: services/exam-service/Dockerfile
    ports:
      - "8083:8080"
    volumes:
      - ./shared:/app/shared:ro
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      # interval: 10s
      # timeout: 5s
      # retries: 5
    develop:
      watch:
        - action: rebuild
          path: ./services/exam-service

  candidate-service:
    build:
      context: .
      dockerfile: services/candidate-service/Dockerfile
    ports:
      - "8084:8080"
    volumes:
      - ./shared:/app/shared:ro
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      # interval: 10s
      # timeout: 5s
      # retries: 5
    develop:
      watch:
        - action: rebuild
          path: ./services/candidate-service

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    ports:
      - "8085:8080"
    volumes:
      - ./shared:/app/shared:ro
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      # interval: 10s
      # timeout: 5s
      # retries: 5
    develop:
      watch:
        - action: rebuild
          path: ./services/payment-service

  # --- Python Services ---
  proctoring-service:
    build: ./services/proctoring-service
    ports:
      - "8086:8000"
    volumes:
      - ./shared:/app/shared:ro
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\").read()' || exit 1"]
      # interval: 10s
      # timeout: 5s
      # retries: 5
    develop:
      watch:
        - action: sync+restart
          path: ./services/proctoring-service
          target: /app
        - action: rebuild
          path: ./services/proctoring-service/requirements.txt

  grading-service:
    build: ./services/grading-service
    ports:
      - "8087:8000"
    volumes:
      - ./shared:/app/shared:ro
    env_file:
