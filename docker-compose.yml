services:
  # --- Infrastructure ---
  postgres:
    image: postgres:15-alpine
    env_file:
      - .env.dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
  
  pgadmin:
    image: dpage/pgadmin4:9.13
    env_file:
      - .env.dev
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
  
  kafka:
    image: apache/kafka:4.2.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]

  # --- Go Services ---
  api-gateway:
    build:
      context: .
      dockerfile: infra/docker/dev/go-service.Dockerfile
      args:
        SERVICE_NAME: api-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./.env.dev:/app/.env
      - ./services/api-gateway:/app/services/api-gateway
      - ./shared:/app/shared:ro
      - go_pkg_cache:/go/pkg/mod
    env_file:
      - .env.dev
    depends_on:
      redis:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: infra/docker/dev/go-service.Dockerfile
      args:
        SERVICE_NAME: auth-service
    ports:
      - "8081:8080"
    volumes:
      - ./.env.dev:/app/.env
      - ./services/auth-service:/app/services/auth-service
      - ./shared:/app/shared:ro
      - go_pkg_cache:/go/pkg/mod
    env_file:
      - .env.dev
    depends_on:
      postgres:
        condition: service_healthy

  enterprise-service:
    build:
      context: .
      dockerfile: infra/docker/dev/go-service.Dockerfile
      args:
        SERVICE_NAME: enterprise-service
    ports:
      - "8082:8080"
    volumes:
      - ./.env.dev:/app/.env
      - ./services/enterprise-service:/app/services/enterprise-service
      - ./shared:/app/shared:ro
      - go_pkg_cache:/go/pkg/mod
    env_file:
      - .env.dev
    depends_on:
      postgres:
        condition: service_healthy

  exam-service:
    build:
      context: .
      dockerfile: infra/docker/dev/go-service.Dockerfile
      args:
        SERVICE_NAME: exam-service
    ports:
      - "8083:8080"
    volumes:
      - ./.env.dev:/app/.env
      - ./services/exam-service:/app/services/exam-service
      - ./shared:/app/shared:ro
      - go_pkg_cache:/go/pkg/mod
    env_file:
      - .env.dev
    depends_on:
      postgres:
        condition: service_healthy

  candidate-service:
    build:
      context: .
      dockerfile: infra/docker/dev/go-service.Dockerfile
      args:
        SERVICE_NAME: candidate-service
    ports:
      - "8084:8080"
    volumes:
      - ./.env.dev:/app/.env
      - ./services/candidate-service:/app/services/candidate-service
      - ./shared:/app/shared:ro
      - go_pkg_cache:/go/pkg/mod
    env_file:
      - .env.dev
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: infra/docker/dev/go-service.Dockerfile
      args:
        SERVICE_NAME: notification-service
    ports:
      - "8090:8080"
    volumes:
      - ./.env.dev:/app/.env
      - ./services/notification-service:/app/services/notification-service
      - ./shared:/app/shared:ro
      - go_pkg_cache:/go/pkg/mod
    env_file:
      - .env.dev
    depends_on:
      kafka:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: infra/docker/dev/go-service.Dockerfile
      args:
        SERVICE_NAME: payment-service
    ports:
      - "8085:8080"
    volumes:
      - ./.env.dev:/app/.env
      - ./services/payment-service:/app/services/payment-service
      - ./shared:/app/shared:ro
      - go_pkg_cache:/go/pkg/mod
    env_file:
      - .env.dev
    depends_on:
      postgres:
        condition: service_healthy

  # --- Python Services ---
  proctoring-service:
    build:
      context: ./services/proctoring-service
      dockerfile: ../../infra/docker/dev/python-service.Dockerfile
      args:
        SERVICE_NAME: proctoring-service
    ports:
      - "8086:8000"
    volumes:
      - ./.env.dev:/app/.env.dev
      - ./services/proctoring-service:/app
      - ./shared:/app/shared:ro
    env_file:
      - .env.dev

  grading-service:
    build:
      context: ./services/grading-service
      dockerfile: ../../infra/docker/dev/python-service.Dockerfile
      args:
        SERVICE_NAME: grading-service
    ports:
      - "8087:8000"
    volumes:
      - ./.env.dev:/app/.env.dev
      - ./services/grading-service:/app
      - ./shared:/app/shared:ro
    env_file:
      - .env.dev

  reporting-service:
    build:
      context: ./services/reporting-service
      dockerfile: ../../infra/docker/dev/python-service.Dockerfile
      args:
        SERVICE_NAME: reporting-service
    ports:
      - "8088:8000"
    volumes:
      - ./.env.dev:/app/.env.dev
      - ./services/reporting-service:/app
      - ./shared:/app/shared:ro
    env_file:
      - .env.dev

  face-verification-service:
    build:
      context: ./services/face-verification-service
      dockerfile: ../../infra/docker/dev/python-service.Dockerfile
      args:
        SERVICE_NAME: face-verification-service
    ports:
      - "8089:8000"
    volumes:
      - ./.env.dev:/app/.env.dev
      - ./services/face-verification-service:/app
      - ./shared:/app/shared:ro
    env_file:
      - .env.dev

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  go_pkg_cache:
