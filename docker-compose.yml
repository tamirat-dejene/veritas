  # --- Python Services ---
  proctoring-service:
    build: ./services/proctoring-service
    ports:
      - "8086:8000"
    volumes:
      - ./shared:/app/shared:ro
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\").read()' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grading-service:
