services:
  # --- Infrastructure ---
  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      # interval: 10s
      # timeout: 5s
      # retries: 5
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      # interval: 10s
      # timeout: 5s
      # retries: 5

  # prometheus:
  #   image: prom/prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml

  # grafana:
  #   image: grafana/grafana
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - prometheus

  # --- Go Services ---
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./shared:/app/shared:ro
    env_file:
      - .env
    depends_on:
      auth-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1",
        ]
      # interval: 10s
      # timeout: 5s
      # retries: 5
    develop:
      watch:
        - action: rebuild
          path: ./services/api-gateway

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "8081:8080"
    volumes:
      - ./shared:/app/shared:ro
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1",
        ]
      # interval: 10s
      # timeout: 5s
      # retries: 5
    develop:
      watch:
        - action: rebuild
          path: ./services/auth-service

  enterprise-service:
    build:
      context: .
      dockerfile: services/enterprise-service/Dockerfile
    ports:
      - "8082:8080"
    volumes:
      - ./shared:/app/shared:ro
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1",
        ]
      # interval: 10s
      # timeout: 5s
      # retries: 5
    develop:
      watch:
        - action: rebuild
          path: ./services/enterprise-service

  exam-service:
    build:
      context: .
      dockerfile: services/exam-service/Dockerfile
    ports:
      - "8083:8080"
    volumes:
      - ./shared:/app/shared:ro
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1",
        ]
      # interval: 10s
      # timeout: 5s
      # retries: 5
    develop:
      watch:
        - action: rebuild
          path: ./services/exam-service

  candidate-service:
    build:
      context: .
      dockerfile: services/candidate-service/Dockerfile
    ports:
      - "8084:8080"
    volumes:
      - ./shared:/app/shared:ro
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1",
        ]
      # interval: 10s
      # timeout: 5s
      # retries: 5
    develop:
      watch:
        - action: rebuild
          path: ./services/candidate-service

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    ports:
      - "8085:8080"
    volumes:
      - ./shared:/app/shared:ro
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1",
        ]
      # interval: 10s
      # timeout: 5s
      # retries: 5
    develop:
      watch:
        - action: rebuild
          path: ./services/payment-service

  # --- Python Services ---
  proctoring-service:
    build: ./services/proctoring-service
    ports:
      - "8086:8000"
    volumes:
      - ./shared:/app/shared:ro
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c ''import urllib.request; urllib.request.urlopen("http://localhost:8000/health").read()'' || exit 1',
        ]
      # interval: 10s
      # timeout: 5s
      # retries: 5
    develop:
      watch:
        - action: sync+restart
          path: ./services/proctoring-service
          target: /app
        - action: rebuild
          path: ./services/proctoring-service/requirements.txt

  grading-service:
    build: ./services/grading-service
    ports:
      - "8087:8000"
    volumes:
      - ./shared:/app/shared:ro
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c ''import urllib.request; urllib.request.urlopen("http://localhost:8000/health").read()'' || exit 1',
        ]
      # interval: 10s
      # timeout: 5s
      # retries: 5
    develop:
      watch:
        - action: sync+restart
          path: ./services/grading-service
          target: /app
        - action: rebuild
          path: ./services/grading-service/requirements.txt

  reporting-service:
    build: ./services/reporting-service
    ports:
      - "8088:8000"
    volumes:
      - ./shared:/app/shared:ro
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c ''import urllib.request; urllib.request.urlopen("http://localhost:8000/health").read()'' || exit 1',
        ]
      # interval: 10s
      # timeout: 5s
      # retries: 5
    develop:
      watch:
        - action: sync+restart
          path: ./services/reporting-service
          target: /app
        - action: rebuild
          path: ./services/reporting-service/requirements.txt

  face-verification-service:
    build: ./services/face-verification-service
    ports:
      - "8089:8000"
    volumes:
      - ./shared:/app/shared:ro
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\").read()' || exit 1"]
      # interval: 10s
      # timeout: 5s
      # retries: 5
    develop:
      watch:
        - action: sync+restart
          path: ./services/face-verification-service
          target: /app
        - action: rebuild
          path: ./services/face-verification-service/requirements.txt

  kafka:
    image: apache/kafka:4.2.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      # interval: 10s
      # timeout: 5s
      # retries: 5

volumes:
  postgres_data:
  redis_data:
  kafka_data:
